name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (TypeScript + Tests)
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: ${{ secrets.MSSQL_TEST_PASSWORD || 'TestPassword1!' }}
          ACCEPT_EULA: Y
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TestPassword1!' -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      MSSQL_HOST: localhost
      MSSQL_PORT: 1433
      MSSQL_USER: sa
      MSSQL_PASSWORD: TestPassword1!
      MSSQL_DATABASE: factorymap_test
      MSSQL_ENCRYPT: "false"
      MSSQL_TRUST_CERT: "true"
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      ITSM_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Create test database
        run: |
          for i in {1..20}; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TestPassword1!' \
              -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name='factorymap_test') CREATE DATABASE factorymap_test" \
              -No && break || sleep 5
          done

      - name: Run tests
        run: npm test

      - name: Security audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript + Tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (includes TypeScript check via fork-ts-checker)
        run: npm run build
        env:
          CI: false
          SKIP_PREFLIGHT_CHECK: "true"
          REACT_APP_API_URL: http://localhost:4000/api

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Security audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Docker build smoke-test ──────────────────────────────────────────────────
  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          cp .env.example .env
          echo "MSSQL_PASSWORD=TestPassword1!" >> .env
          echo "JWT_SECRET=ci-build-smoke-test" >> .env

      - name: Build images
        run: docker compose build --no-cache backend
